<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Overlay</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="20" height="20" rx="4" stroke="url(#grad1)" stroke-width="2"/>
          <circle cx="8.5" cy="8.5" r="2" fill="url(#grad1)"/>
          <path d="M2 16l5-5 3 3 4-4 8 8v2a4 4 0 01-4 4H6a4 4 0 01-4-4v-4z" fill="url(#grad2)" opacity="0.6"/>
          <defs>
            <linearGradient id="grad1" x1="0" y1="0" x2="24" y2="24">
              <stop stop-color="#a78bfa"/>
              <stop offset="1" stop-color="#6366f1"/>
            </linearGradient>
            <linearGradient id="grad2" x1="0" y1="12" x2="24" y2="24">
              <stop stop-color="#818cf8"/>
              <stop offset="1" stop-color="#4f46e5"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>Image Overlay</h1>
      <p class="subtitle">Drop an image to overlay on any page</p>
    </header>

    <div id="dropZone" class="drop-zone">
      <div class="drop-zone-content">
        <svg class="drop-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span class="drop-text">Drag & drop image here</span>
        <span class="drop-subtext">or click to browse</span>
      </div>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <div id="preview" class="preview hidden">
      <div class="preview-image-wrapper">
        <img id="previewImage" src="" alt="Preview">
      </div>
      <div class="preview-info">
        <span id="fileName" class="file-name"></span>
        <button id="removeBtn" class="btn-remove" title="Remove image">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <button id="applyBtn" class="btn-apply hidden">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      Apply Overlay
    </button>

    <div id="activeOverlay" class="active-overlay hidden">
      <div class="active-badge">
        <span class="pulse"></span>
        <span>Overlay Active</span>
      </div>
      <div class="toggle-row">
        <label class="toggle-label" for="allTabsToggle">All Tabs</label>
        <label class="toggle-switch">
          <input type="checkbox" id="allTabsToggle">
          <span class="toggle-track"></span>
        </label>
      </div>
      <button id="removeOverlayBtn" class="btn-remove-overlay">Remove Overlay</button>
    </div>

    <footer class="footer">
      <p>Resize &amp; adjust opacity directly on page</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
